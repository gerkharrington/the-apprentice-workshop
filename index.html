<!DOCTYPE html>
<html>

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Role Creator</title>

  <style>
    /* Default styles */
    /* ----------------------------- */
    * {
      /* Keeps everything on screen */
      box-sizing: border-box;
    }

    body {
      /* Body text */
      margin: 0;
      display: flex;
      height: 100vh;
      font-family: Arial, sans-serif;
      overflow: hidden;
      background: #000000 url('assets/background.png') center center/cover no-repeat fixed;
      color: #FFFFFF;
    }

    h2 {
      /* Header text */
      margin: 0 0 15px 0;
      font-size: 32px;
      font-weight: 600;
      line-height: 1.2;
      color: #FFFFFF;

    }

    /* ----------------------------- */

    /* Hidden Elements */
    /* ----------------------------- */
    .hidden {
      display: none;
    }

    /* ----------------------------- */

    /* Sidebar Style */
    /* ----------------------------- */
    .sidebar_main {
      width: 250px;
      background: #222;
      color: #FFFFFF;
      padding: 20px;

      display: flex;
      flex-direction: column;

      overflow-y: auto;
      height: 100vh;
    }

    .sidebar_list {
      flex: 1;
      overflow-y: auto;
      margin-top: 10px;
    }

    .sidebar_entry {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar_entry.selected {
      background: #444;
      border-left: 4px solid #2c7be5;
    }

    .sidebar_add {
      margin: 5px 0;
      padding: 5px 10px;
      cursor: pointer;
      border: none;
    }

    .sidebar_delete {
      margin: 5px 0;
      padding: 2px 8px;
      font-weight: bold;
      background: #883333;
      color: #FFFFFF;
      cursor: pointer;
      border: none;
    }

    .sidebar_delete:hover {
      background: #aa4444;
    }

    /* ----------------------------- */

    /* Editor Style */
    /* ----------------------------- */

    .editor_main {
      flex: 1;
      padding: 20px;
      width: 250px;
    }

    .editor_empty {
      margin: 5px 0;
      padding: 10px 10px;
    }

    .editor_input {
      width: 100%;
      margin-bottom: 10px;
      resize: vertical;
    }

    .editor_input_top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .editor_text {
      width: 100%;
      margin-bottom: 10px;
      resize: vertical;
    }

    .editor_icon {
      display: none;
    }

    .editor_icon_upload {
      width: 50px;
      height: 50px;
      position: relative;
      cursor: pointer;
      border: 1px dashed #aaa;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .editor_icon_upload.has_icon {
      border: none;
    }

    .editor_icon_placeholder {
      font-size: 20px;
      color: #888;
      user-select: none;
    }

    .editor_preview {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    /* ----------------------------- */
  </style>

</head>

<body>

  <div class="sidebar_main">
    <h2>Roles</h2>
    <div id="sidebar_list" class="sidebar_list"></div>
    <button id="sidebar_add" class="sidebar_add">+ Add Role</button>
  </div>

  <div class="editor_main">
    <h2>Role Editor</h2>

    <p id="editor_empty" class="editor_empty">Select or add a role to begin!</p>

    <div id="editor_input" class="hidden">

      <input id="single_role_icon" class="editor_icon" type="file" accept="image/*">

      <div class="editor_input_top">

        <div id="editor_icon_upload" class="editor_icon_upload">
          <img id="editor_preview" class="editor_preview">
          <span id="editor_icon_placeholder" class="editor_icon_placeholder">+</span>
        </div>

        <input id="single_role_name" class="editor_input" placeholder="Role Name" type="text">
      </div>

      <textarea id="single_role_ability1" class="editor_text" placeholder="1st Ability"></textarea>
      <textarea id="single_role_ability2" class="editor_text" placeholder="2nd Ability (Optional)"></textarea>

    </div>
  </div>

  <script>
    let data_roles = [];
    let sidebar_selected = null;

    const element_single_role_name = document.getElementById("single_role_name");
    const element_single_role_ability1 = document.getElementById("single_role_ability1");
    const element_single_role_ability2 = document.getElementById("single_role_ability2");
    const element_single_role_icon = document.getElementById("single_role_icon");
    const element_editor_input = document.getElementById("editor_input");
    const element_editor_empty = document.getElementById("editor_empty");
    const element_editor_preview = document.getElementById("editor_preview");
    const element_editor_icon_upload = document.getElementById("editor_icon_upload");
    const element_editor_icon_placeholder = document.getElementById("editor_icon_placeholder");
    const element_sidebar_list = document.getElementById("sidebar_list");
    const element_sidebar_add = document.getElementById("sidebar_add");

    function data_roles_add() {
      data_roles.push({ name: "Untitled Role", ability1: "", ability2: "", icon: "" });
      sidebar_selected = data_roles.length - 1;
      sidebar_render();
      data_roles_load();
    }

    function sidebar_render() {
      const list = element_sidebar_list;
      list.innerHTML = "";

      data_roles.forEach((role, index) => {
        const div = document.createElement("div");
        div.className = "sidebar_entry";

        if (index === sidebar_selected) {
          div.classList.add("selected");
        }

        /* Create delete button */
        /* ----------------------------- */
        const sidebar_delete = document.createElement("button");
        sidebar_delete.textContent = "-";
        sidebar_delete.classList.add("sidebar_delete");
        sidebar_delete.onclick = (e) => {
          e.stopPropagation();

          data_roles.splice(index, 1);

          if (data_roles.length === 0) {
            sidebar_selected = null;
            editor_clear();
          } else {
            sidebar_selected = Math.min(index, data_roles.length - 1);
            data_roles_load();
          }

          sidebar_render();

        };
        /* ----------------------------- */

        /* Create role icon */
        /* ----------------------------- */
        const container = document.createElement("div");
        container.style.display = "flex";
        container.style.alignItems = "center";
        container.style.gap = "8px";

        if (role.icon) {
          const img = document.createElement("img");
          img.src = role.icon;
          img.style.width = "24px";
          img.style.height = "24px";
          img.style.objectFit = "cover";
          img.style.borderRadius = "4px";
          container.appendChild(img);
        }
        /* ----------------------------- */

        /* Render everything together */
        /* ----------------------------- */
        const name = document.createElement("span");

        name.textContent = role.name;

        container.appendChild(name);

        div.appendChild(sidebar_delete);
        div.appendChild(container);
        div.appendChild(name);

        div.onclick = () => {
          /* Makes it clickable to select */
          sidebar_selected = index;
          sidebar_render();
          data_roles_load();
        };
        /* ----------------------------- */

        list.appendChild(div);
      });
    }

    function data_roles_load() {
      if (sidebar_selected === null) {
        editor_clear();
        return;
      }
      const role = data_roles[sidebar_selected];

      element_single_role_name.value = role.name;
      element_single_role_ability1.value = role.ability1;
      element_single_role_ability2.value = role.ability2;

      if (role.icon) {
        /* We have an icon for this role */
        element_editor_preview.src = role.icon;
        element_editor_preview.style.display = "block";
        element_editor_icon_upload.classList.add("has_icon");
      } else {
        /* We do not have an icon for this role */
        element_editor_preview.style.display = "none";
        element_editor_icon_upload.classList.remove("has_icon");
      }

      element_editor_input.classList.remove("hidden");
      element_editor_empty.classList.add("hidden");

    }
    function editor_clear() {

      element_single_role_name.value = "";
      element_single_role_icon.value = "";
      element_single_role_ability1.value = "";
      element_single_role_ability2.value = "";

      element_editor_input.classList.add("hidden");
      element_editor_empty.classList.remove("hidden");
    }


    element_single_role_name.addEventListener("input", function () {
      if (sidebar_selected === null) return;


      if (this.value.trim() === "") {
        data_roles[sidebar_selected].name = "Untitled Role";
      } else {
        data_roles[sidebar_selected].name = this.value;
      }
      sidebar_render();
    });

    element_single_role_ability1.addEventListener("input", function () {
      if (sidebar_selected === null) return;

      data_roles[sidebar_selected].ability1 = this.value;
      sidebar_render();
    });

    element_single_role_ability2.addEventListener("input", function () {
      if (sidebar_selected === null) return;

      data_roles[sidebar_selected].ability2 = this.value;
      sidebar_render();
    });

    element_single_role_icon.addEventListener("change", function () {
      if (sidebar_selected === null) return;

      const file = this.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = function (e) {
        const icon = e.target.result;
        data_roles[sidebar_selected].icon = icon;
        element_editor_preview.src = icon;
        element_editor_preview.style.display = "block";

        element_editor_icon_upload.classList.add("has_icon");
      };

      reader.readAsDataURL(file);
    });

    /* Makes the "Add Role" button clickable to add a new role */
    element_sidebar_add.addEventListener("click", data_roles_add);

    /* Makes the icon in the editor clickable to upload a different one */
    element_editor_icon_upload.addEventListener("click", () => { element_single_role_icon.click(); });

    if (data_roles.length === 0) {
      editor_clear();
    }
  </script>

</body>

</html>
